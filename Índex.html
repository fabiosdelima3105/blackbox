<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#000"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Black Box"/>
<title>Black Box Filmes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f5;color:#111;font-family:'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}

</style>

<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect}=React;
const KEYS={c:"bb_c",ct:"bb_ct",f:"bb_f",p:"bb_p",fc:"bb_fc",ci:"bb_ci"};
const load=k=>{try{return JSON.parse(localStorage.getItem(k)||"[]");}catch{return[];}};
const save=(k,d)=>{try{localStorage.setItem(k,JSON.stringify(d));}catch{}};
const uid=()=>Math.random().toString(36).slice(2,10);
const today=()=>new Date().toISOString().split("T")[0];
const fBRL=v=>(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const fPct=v=>`${(v||0).toFixed(1)}%`;
const dDays=d=>{if(!d)return null;const a=new Date(d);a.setHours(0,0,0,0);const b=new Date();b.setHours(0,0,0,0);return Math.round((a-b)/86400000);};
const SV=["Briefing","Roteiro","Captação","Edição","Revisão","Aprovado","Agendado","Postado"];
const SCL=["Ativo","Pausado","Encerrado","Negociação"];
const SPY=["Pendente","Pago","Atrasado","Cancelado"];
const SCT=["Mensal","Trimestral","Semestral","Anual"];
const PL=["Instagram","TikTok","YouTube","Facebook","LinkedIn"];
const VP=[{id:"p4",label:"4 vídeos / 1 diária"},{id:"p8",label:"8 vídeos / 2 diárias"},{id:"p12",label:"12 vídeos / 3 diárias"},{id:"p16",label:"16 vídeos / 4 diárias"}];
const SC={Briefing:"#7c3aed",Roteiro:"#9333ea","Captação":"#d97706","Edição":"#2563eb","Revisão":"#db2777",Aprovado:"#16a34a",Agendado:"#0891b2",Postado:"#15803d",Ativo:"#15803d",Pausado:"#d97706",Encerrado:"#dc2626","Negociação":"#7c3aed",Pendente:"#d97706",Pago:"#15803d",Atrasado:"#dc2626",Cancelado:"#999"};
const sc=s=>SC[s]||"#555";
const Badge=({label,color,bw})=><span style={{background:bw?"#f0f0f0":(color||sc(label))+"18",color:bw?"#333":(color||sc(label)),border:`1px solid ${bw?"#ddd":(color||sc(label))+"40"}`,borderRadius:4,padding:"2px 9px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{label}</span>;
const Dot=({s})=><span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:sc(s),marginRight:4,flexShrink:0}}/>;
const Card=({children,style={}})=><div style={{background:"#fff",border:"1px solid #e8e8e8",borderRadius:10,padding:18,...style}}>{children}</div>;
const KPI=({label,value,sub,hi})=><Card style={{minWidth:130,borderTop:`3px solid ${hi||"#e8e8e8"}`}}><div style={{color:"#999",fontSize:10,marginBottom:3,textTransform:"uppercase",letterSpacing:0.8}}>{label}</div><div style={{color:hi||"#111",fontSize:20,fontWeight:800}}>{value}</div>{sub&&<div style={{color:"#bbb",fontSize:10,marginTop:2}}>{sub}</div>}</Card>;
const Inp=({label,value,onChange,type="text",options,style={}})=>(<div style={{display:"flex",flexDirection:"column",gap:3,...style}}>{label&&<label style={{color:"#888",fontSize:10,textTransform:"uppercase",letterSpacing:0.8,fontWeight:700}}>{label}</label>}{options?<select value={value} onChange={e=>onChange(e.target.value)} style={{background:"#fff",border:"1px solid #e0e0e0",color:"#111",borderRadius:6,padding:"8px 10px",fontSize:13}}><option value="">Selecione</option>{options.map(o=><option key={o.value??o} value={o.value??o}>{o.label??o}</option>)}</select>:<input type={type} value={value} onChange={e=>onChange(e.target.value)} style={{background:"#fff",border:"1px solid #e0e0e0",color:"#111",borderRadius:6,padding:"8px 10px",fontSize:13}}/>}</div>);
const Chk=({label,checked,onChange})=><label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",color:"#444",fontSize:13}}><input type="checkbox" checked={checked} onChange={e=>onChange(e.target.checked)} style={{width:15,height:15,accentColor:"#000"}}/>{label}</label>;
const Btn=({children,onClick,variant="primary",small,style={},disabled})=>{const vs={primary:{background:"#111",color:"#fff",border:"none",fontWeight:700},danger:{background:"#dc2626",color:"#fff",border:"none",fontWeight:700},ghost:{background:"transparent",color:"#888",border:"1px solid #ddd"},outline:{background:"transparent",color:"#111",border:"1.5px solid #111",fontWeight:700}};return <button onClick={onClick} disabled={disabled} style={{...vs[variant],borderRadius:6,padding:small?"3px 11px":"8px 16px",fontSize:small?11:13,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.4:1,...style}}>{children}</button>;};
const Modal=({title,children,onClose,wide})=>(<div style={{position:"fixed",inset:0,background:"#00000060",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}><div style={{background:"#fff",border:"1px solid #e8e8e8",borderRadius:12,width:wide?"min(880px,96vw)":"min(540px,96vw)",maxHeight:"92vh",overflow:"auto",padding:24}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,borderBottom:"2px solid #111",paddingBottom:10}}><h2 style={{color:"#111",margin:0,fontSize:15,fontWeight:800}}>{title}</h2><button onClick={onClose} style={{background:"none",border:"none",color:"#999",fontSize:20,cursor:"pointer"}}>✕</button></div>{children}</div></div>);
const G=({cols=2,children,gap=10,style={}})=><div style={{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap,...style}}>{children}</div>;
const ST=({children})=><div style={{color:"#111",fontWeight:800,fontSize:10,letterSpacing:1.5,textTransform:"uppercase",marginTop:16,marginBottom:7,borderBottom:"1px solid #111",paddingBottom:4}}>{children}</div>;
const AB=({msg,type="warn"})=>{const c={warn:"#d97706",danger:"#dc2626",info:"#2563eb"};return<div style={{background:c[type]+"12",borderLeft:`3px solid ${c[type]}`,borderRadius:"0 6px 6px 0",padding:"7px 12px",color:c[type],fontSize:12,fontWeight:600,marginBottom:5}}>{msg}</div>;};
const PH=()=><div style={{color:"#ccc",textAlign:"center",padding:"40px 0",border:"1px dashed #e0e0e0",borderRadius:8,fontSize:13}}>Nenhum item cadastrado.</div>;
const PHdr=({title,action,label})=><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,borderBottom:"2px solid #111",paddingBottom:12}}><h2 style={{fontWeight:800,fontSize:18,letterSpacing:-0.5}}>{title}</h2>{action&&<Btn onClick={action}>{label}</Btn>}</div>;
function App(){
const[tab,setTab]=useState("dashboard");
const[clients,setClients]=useState(()=>load(KEYS.c));
const[contracts,setContracts]=useState(()=>load(KEYS.ct));
const[financials,setFinancials]=useState(()=>load(KEYS.f));
const[productions,setProductions]=useState(()=>load(KEYS.p));
const[fixedCosts,setFixedCosts]=useState(()=>load(KEYS.fc));
const[contentItems,setContentItems]=useState(()=>load(KEYS.ci));
const[notifs,setNotifs]=useState([]);
const[showN,setShowN]=useState(false);
const[side,setSide]=useState(false);
useEffect(()=>{save(KEYS.c,clients);},[clients]);
useEffect(()=>{save(KEYS.ct,contracts);},[contracts]);
useEffect(()=>{save(KEYS.f,financials);},[financials]);
useEffect(()=>{save(KEYS.p,productions);},[productions]);
useEffect(()=>{save(KEYS.fc,fixedCosts);},[fixedCosts]);
useEffect(()=>{save(KEYS.ci,contentItems);},[contentItems]);
useEffect(()=>{const ns=[];contracts.forEach(c=>{const cl=clients.find(x=>x.id===c.clientId),nm=cl?.company||cl?.name||"Cliente",d=dDays(c.endDate);if(d===null)return;if(d<0)ns.push({id:c.id+"e",type:"danger",msg:`Contrato VENCIDO — ${nm}`});else if(d<=7)ns.push({id:c.id+"7",type:"danger",msg:`Vence em ${d}d — ${nm}`});else if(d<=15)ns.push({id:c.id+"15",type:"warn",msg:`Vence em ${d}d — ${nm}`});else if(d<=30)ns.push({id:c.id+"30",type:"info",msg:`Vence em ${d}d — ${nm}`});});financials.forEach(f=>{const cl=clients.find(x=>x.id===f.clientId),nm=cl?.company||cl?.name||"Cliente",d=dDays(f.dueDate);if(d!==null&&f.paymentStatus==="Pendente"){if(d<0)ns.push({id:f.id+"pe",type:"danger",msg:`Pgto VENCIDO — ${nm}`});else if(d<=5)ns.push({id:f.id+"p5",type:"warn",msg:`Pgto vence em ${d}d — ${nm}`});}});setNotifs(ns);},[contracts,clients,financials]);
const ac=clients.filter(c=>c.status==="Ativo");
const rc=contracts.filter(c=>{const d=dDays(c.endDate);return d!==null&&d>=0&&d<=30;});
const ec=contracts.filter(c=>{const d=dDays(c.endDate);return d!==null&&d<0;});
const tFx=fixedCosts.reduce((s,c)=>s+(Number(c.value)||0),0);
const pR=financials.filter(f=>f.paymentStatus==="Pago").reduce((s,f)=>s+(Number(f.monthlyValue)||0),0);
const prR=financials.filter(f=>f.paymentStatus!=="Cancelado").reduce((s,f)=>s+(Number(f.monthlyValue)||0),0);
const avgT=ac.length?prR/ac.length:0;
const fSh=ac.length>0?tFx/ac.length:0;
const cP=clients.map(cl=>{const fin=financials.find(f=>f.clientId===cl.id)||{};const rev=Number(fin.monthlyValue)||0,vr=Number(fin.variableCosts)||0,gross=rev-vr-fSh,margin=rev>0?(gross/rev)*100:0;const hrs=(Number(fin.hoursScript)||0)+(Number(fin.hoursCapture)||0)+(Number(fin.hoursEdit)||0)+(Number(fin.hoursReview)||0);const prod=productions.find(pr=>pr.clientId===cl.id)||{};return{...cl,rev,gross,margin,hrs,cpv:(prod.videosProduced||0)>0?(vr+fSh)/prod.videosProduced:0,fin,prod};});
const TABS=[{id:"dashboard",icon:"◼",label:"Dashboard"},{id:"clients",icon:"○",label:"Clientes"},{id:"contracts",icon:"◻",label:"Contratos"},{id:"financial",icon:"◈",label:"Financeiro"},{id:"production",icon:"▶",label:"Produção"},{id:"content",icon:"▦",label:"Conteúdo"},{id:"costs",icon:"◇",label:"Custos"},{id:"install",icon:"↓",label:"Instalar App"},{id:"settings",icon:"◎",label:"Config."}];
const go=t=>{setTab(t);setSide(false);};
return(<div style={{minHeight:"100vh",background:"#f5f5f5"}}>
<div style={{background:"#fff",borderBottom:"1px solid #e8e8e8",padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:52,position:"sticky",top:0,zIndex:100}}>
<div style={{display:"flex",alignItems:"center",gap:10}}>
<button onClick={()=>setSide(v=>!v)} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#555",padding:"4px 6px"}}>☰</button>
<div style={{fontWeight:900,fontSize:16,letterSpacing:-0.5}}>BLACK BOX <span style={{fontWeight:300,color:"#999"}}>filmes</span></div>
</div>
<div style={{display:"flex",alignItems:"center",gap:10}}>
<div style={{position:"relative"}}>
<button onClick={()=>setShowN(v=>!v)} style={{background:"none",border:"1px solid #e8e8e8",borderRadius:6,cursor:"pointer",color:notifs.filter(n=>n.type==="danger").length?"#dc2626":"#888",fontSize:12,padding:"4px 10px",fontWeight:700}}>● {notifs.length} alertas</button>
{showN&&<div style={{position:"absolute",right:0,top:40,background:"#fff",border:"1px solid #e8e8e8",borderRadius:10,width:"min(320px,90vw)",maxHeight:260,overflow:"auto",padding:12,zIndex:200,boxShadow:"0 8px 24px #0001"}}><div style={{fontWeight:800,fontSize:10,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Alertas</div>{notifs.length===0?<div style={{color:"#ccc",fontSize:13}}>Nenhum alerta.</div>:notifs.map(n=><AB key={n.id} msg={n.msg} type={n.type}/>)}</div>}
</div>
<div style={{color:"#ccc",fontSize:11}}>{new Date().toLocaleDateString("pt-BR")}</div>
</div>
</div>
<div style={{display:"flex"}}>
{side&&<div style={{position:"fixed",inset:0,background:"#00000040",zIndex:90}} onClick={()=>setSide(false)}/>}
<div style={{width:185,background:"#fff",borderRight:"1px solid #e8e8e8",padding:"8px 6px",position:"fixed",top:52,left:0,height:"calc(100vh - 52px)",overflow:"auto",zIndex:91,transform:side?"translateX(0)":"translateX(-200px)",transition:"transform 0.2s ease"}}>
{TABS.map(t=><button key={t.id} onClick={()=>go(t.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:9,padding:"9px 12px",borderRadius:6,border:"none",cursor:"pointer",fontSize:12,background:tab===t.id?"#111":"transparent",color:tab===t.id?"#fff":"#666",marginBottom:1,textAlign:"left",fontWeight:tab===t.id?700:400}}><span style={{fontSize:11,fontFamily:"monospace",opacity:0.6}}>{t.icon}</span>{t.label}</button>)}
</div>
<div style={{flex:1,padding:"20px 16px",overflowX:"auto",minWidth:0}}>
{tab==="dashboard"&&<DashTab ac={ac} rc={rc} ec={ec} pR={pR} prR={prR} avgT={avgT} cP={cP} notifs={notifs} productions={productions}/>}
{tab==="clients"&&<ClientsTab clients={clients} setClients={setClients} contracts={contracts} financials={financials} productions={productions}/>}
{tab==="contracts"&&<ContractsTab contracts={contracts} setContracts={setContracts} clients={clients}/>}
{tab==="financial"&&<FinancialTab financials={financials} setFinancials={setFinancials} clients={clients} fixedCosts={fixedCosts} fSh={fSh}/>}
{tab==="production"&&<ProductionTab productions={productions} setProductions={setProductions} clients={clients}/>}
{tab==="content"&&<ContentTab contentItems={contentItems} setContentItems={setContentItems} clients={clients}/>}
{tab==="costs"&&<CostsTab fixedCosts={fixedCosts} setFixedCosts={setFixedCosts}/>}
{tab==="install"&&<InstallTab/>}
{tab==="settings"&&<SettingsTab setClients={setClients} setContracts={setContracts} setFinancials={setFinancials} setProductions={setProductions} setFixedCosts={setFixedCosts} setContentItems={setContentItems}/>}
</div>
</div>
<div id="bnav" style={{display:"none",position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #e8e8e8",zIndex:80,justifyContent:"space-around",padding:"5px 0",paddingBottom:"calc(5px + env(safe-area-inset-bottom))"}}>
{TABS.slice(0,5).map(t=><button key={t.id} onClick={()=>go(t.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 6px",color:tab===t.id?"#111":"#bbb",fontSize:9,fontWeight:tab===t.id?800:400}}><span style={{fontSize:15,fontFamily:"monospace"}}>{t.icon}</span><span>{t.label}</span></button>)}
<button onClick={()=>setSide(v=>!v)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 6px",color:"#bbb",fontSize:9}}><span style={{fontSize:15}}>⋯</span><span>Mais</span></button>
</div>
</div>);}
function DashTab({ac,rc,ec,pR,prR,avgT,cP,notifs,productions}){
const tG=cP.reduce((s,c)=>s+c.gross,0),tH=cP.reduce((s,c)=>s+c.hrs,0);
const tV=productions.reduce((s,p)=>s+(Number(p.videosContracted)||0),0);
const tPr=productions.reduce((s,p)=>s+(Number(p.videosProduced)||0),0);
const top5=[...cP].sort((a,b)=>b.gross-a.gross).slice(0,5);
const top5t=[...cP].sort((a,b)=>b.hrs-a.hrs).slice(0,5);
return(<div>
<div style={{borderBottom:"2px solid #111",paddingBottom:16,marginBottom:20}}>
<div style={{fontWeight:900,fontSize:42,letterSpacing:-3,lineHeight:0.9,marginBottom:6}}><div>BLACK</div><div>BOX</div></div>
<div style={{fontWeight:300,fontSize:12,color:"#bbb",letterSpacing:5,marginBottom:10}}>FILMES</div>
<p style={{color:"#bbb",fontSize:12}}>{new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})} · Sistema de Gestão</p>
</div>
{notifs.filter(n=>n.type==="danger").slice(0,3).map(n=><AB key={n.id} msg={n.msg} type="danger"/>)}
<div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:20}}>
<KPI label="Clientes Ativos" value={ac.length} hi="#111"/>
<KPI label="Fat. Confirmado" value={fBRL(pR)} hi={pR>0?"#15803d":undefined}/>
<KPI label="Fat. Previsto" value={fBRL(prR)}/>
<KPI label="Lucro Bruto" value={fBRL(tG)} hi={tG>=0?"#15803d":"#dc2626"}/>
<KPI label="Ticket Médio" value={fBRL(avgT)}/>
<KPI label="Renovações" value={rc.length} hi={rc.length>0?"#d97706":undefined} sub="próx. 30d"/>
<KPI label="Vencidos" value={ec.length} hi={ec.length>0?"#dc2626":undefined}/>
<KPI label="Horas" value={`${tH}h`}/>
<KPI label="Vídeos" value={`${tPr}/${tV}`} sub="prod./contrat."/>
</div>
<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:14,marginBottom:14}}>
<Card><div style={{fontWeight:800,fontSize:13,marginBottom:12}}>Mais Lucrativos</div>{top5.length===0?<div style={{color:"#ccc",fontSize:12}}>Sem dados.</div>:top5.map((c,i)=>(<div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f0f0f0"}}><div style={{display:"flex",gap:10,alignItems:"center"}}><span style={{color:"#e0e0e0",fontWeight:800,fontSize:16,fontFamily:"monospace",minWidth:20}}>{i+1}</span><div><div style={{fontSize:13,fontWeight:700}}>{c.company||c.name}</div><div style={{color:"#aaa",fontSize:11}}>Margem: <span style={{color:c.margin>=30?"#15803d":c.margin>=10?"#d97706":"#dc2626",fontWeight:700}}>{fPct(c.margin)}</span></div></div></div><div style={{color:c.gross>=0?"#15803d":"#dc2626",fontWeight:800,fontSize:13}}>{fBRL(c.gross)}</div></div>))}</Card>
<Card><div style={{fontWeight:800,fontSize:13,marginBottom:12}}>Mais Tempo</div>{top5t.length===0?<div style={{color:"#ccc",fontSize:12}}>Sem dados.</div>:top5t.map((c,i)=>(<div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f0f0f0"}}><div style={{display:"flex",gap:10,alignItems:"center"}}><span style={{color:"#e0e0e0",fontWeight:800,fontSize:16,fontFamily:"monospace",minWidth:20}}>{i+1}</span><div><div style={{fontSize:13,fontWeight:700}}>{c.company||c.name}</div><div style={{color:"#aaa",fontSize:11}}>Custo/vídeo: {fBRL(c.cpv)}</div></div></div><div style={{fontWeight:800,fontSize:13}}>{c.hrs}h</div></div>))}</Card>
</div>
<Card><div style={{fontWeight:800,fontSize:13,marginBottom:12}}>Margem por Cliente</div>{cP.filter(c=>c.rev>0).length===0?<div style={{color:"#ccc",fontSize:12}}>Cadastre dados financeiros.</div>:cP.filter(c=>c.rev>0).map(c=>(<div key={c.id} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{color:"#444",fontWeight:600}}>{c.company||c.name}</span><span style={{color:c.margin>=30?"#15803d":c.margin>=10?"#d97706":"#dc2626",fontWeight:700}}>{fPct(c.margin)}</span></div><div style={{background:"#f0f0f0",borderRadius:3,height:5}}><div style={{width:`${Math.max(0,Math.min(100,c.margin))}%`,height:"100%",background:c.margin>=30?"#111":c.margin>=10?"#555":"#dc2626",borderRadius:3}}/></div></div>))}</Card>

function CostsTab({fixedCosts,setFixedCosts}){const[modal,setModal]=useState(false);const E={name:"",value:"",category:"Operacional",recurrence:"Mensal"};const[form,setForm]=useState(E);const f=k=>v=>setForm(p=>({...p,[k]:v}));const sv=()=>{if(!form.name||!form.value)return alert("Preencha tudo");setFixedCosts(p=>[...p,{...form,id:uid()}]);setModal(false);setForm(E);};const dl=id=>{if(confirm("Remover?"))setFixedCosts(p=>p.filter(c=>c.id!==id));};const total=fixedCosts.reduce((s,c)=>s+(Number(c.value)||0),0);return(<div><PHdr title="Custos Fixos" action={()=>{setForm(E);setModal(true);}} label="+ Adicionar"/><Card style={{marginBottom:14,background:"#fafafa"}}><span style={{color:"#888",fontSize:11,textTransform:"uppercase",letterSpacing:0.8}}>Total Mensal — </span><span style={{color:"#dc2626",fontWeight:800,fontSize:20}}>{fBRL(total)}</span></Card><div style={{display:"grid",gap:8}}>{fixedCosts.length===0&&<PH/>}{fixedCosts.map(c=><Card key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:700,fontSize:14,marginBottom:3}}>{c.name}</div><div style={{display:"flex",gap:8}}><Badge label={c.category} bw/><span style={{color:"#bbb",fontSize:12}}>{c.recurrence}</span></div></div><div style={{display:"flex",gap:12,alignItems:"center"}}><span style={{color:"#dc2626",fontWeight:800,fontSize:15}}>{fBRL(c.value)}</span><Btn small variant="danger" onClick={()=>dl(c.id)}>✕</Btn></div></Card>)}</div>{modal&&<Modal title="Novo Custo Fixo" onClose={()=>setModal(false)}><G cols={2} gap={10}><Inp label="Nome *" value={form.name} onChange={f("name")}/><Inp label="Valor (R$) *" value={form.value} onChange={f("value")} type="number"/><Inp label="Categoria" value={form.category} onChange={f("category")} options={["Operacional","Tecnologia","Pessoal","Marketing","Infraestrutura","Outros"]}/><Inp label="Recorrência" value={form.recurrence} onChange={f("recurrence")} options={["Mensal","Anual","Eventual"]}/></G><div style={{dis oque em <b>"Adicionar à Tela Início"</b>' s=""/><Step n="4" t='Toque em <b>"Adicionar"</b>' s="Ícone aparece na tela inicial"/></Card>}{(isAnd||(!isIOS&&!isAnd))&&<Card style={{marginBottom:12}}><div style={{fontWeight:800,fontSize:14,marginBottom:4}}>🤖 Android</div><Step n="1" t="Abra no <b>Chrome</b>" s=""/><Step n="2" t="Toque nos <b>3 pontos ⋮</b>" s=""/><Step n="3" t='Toque em <b>"Adicionar à tela inicial"</b>' s=""/><Step n="4" t='Confirme em <b>"Adicionar"</b>' s=""/></Card>}</div>);}
